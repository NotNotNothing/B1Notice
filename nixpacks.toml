[phases.setup]
nixPkgs = [
  "nodejs_22",
  "python3",
  "python3Packages.pip",
  "python3Packages.setuptools",
  "python3Packages.wheel",
  "gcc",
  "pkg-config",
  "postgresql",
  "nodePackages.pnpm"
]

[phases.install]
cmds = [
  "pnpm --version && pnpm config set registry ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com} && pnpm config set fetch-retries 5 && pnpm config set fetch-retry-mintimeout 20000 && pnpm config set fetch-retry-maxtimeout 120000 && pnpm config set network-timeout 300000 && pnpm install --frozen-lockfile",
  "python3 -c \"import sys; print(sys.executable)\" && pip --version && mkdir -p /app/.python-packages && pip install --no-cache-dir --target /app/.python-packages -i ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple} akshare requests"
]

[phases.build]
cmds = [
  "DB_TYPE=pgsql pnpm run db:generate",
  "DB_TYPE=pgsql pnpm exec next build --webpack"
]

[start]
cmd = "sh -lc 'set -a && [ -f .env ] && . .env; set +a; DB_TYPE=pgsql pnpm run db:push && exec pnpm exec next start --hostname 0.0.0.0 --port ${PORT:-3000}'"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
DB_TYPE = "pgsql"
PYTHONIOENCODING = "utf-8"
PYTHONPATH = "/app/.python-packages"
NIXPACKS_PATH = "/app/node_modules/.bin"
NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com"
PIP_INDEX_URL = "https://pypi.tuna.tsinghua.edu.cn/simple"
NPM_CONFIG_FETCH_RETRIES = "5"
NPM_CONFIG_FETCH_RETRY_MIN_TIMEOUT = "20000"
NPM_CONFIG_FETCH_RETRY_MAX_TIMEOUT = "120000"
NPM_CONFIG_NETWORK_TIMEOUT = "300000"
